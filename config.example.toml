# PolyMarket bot config — copy to config.toml and edit. config.toml is git-ignored.
# Secrets (wallet key) go in .env, NOT here.

# Trading mode: "paper" (default, no wallet) or "live" (requires CLI guard flags).
mode = "paper"

# Seconds between scan loops.
scan_interval = 5

[risk]
# All caps are USDC and freely changeable. Defaults are educational-scale.
max_total_exposure = 10      # bot opens no new position once cumulative exposure hits this
max_trade_notional = 5       # max size per single opportunity (<= half total, so >=2 fit)
min_net_edge_per_share = 0.005   # only act when post-fee edge >= this (USDC/share)
max_completion_slippage = 0.02   # cap when crossing the spread to complete a one-leg fill

[market_selector]
# Empty = scan ALL active binary markets.
# To restrict, set either/both:
condition_ids = []           # explicit allowlist of market condition ids
categories = []              # e.g. ["Politics", "Sports"]

[fees]
# Optional override of the per-category taker feeRate table (the "fees change a lot"
# escape hatch). Leave empty to use the built-in effective-dated schedule.
# Example override:
# [fees.rate_override]
# Crypto = 0.07
# Politics = 0.04

[mm]
# Phase 2 market making (Black-Scholes binary quoting). See docs/spec-phase2.md.
# Values below are calibrated from real data via scripts/calibrate_mm.py (liquid
# markets >14 days from resolution, mid-range prices). Re-run it to refresh —
# vol shifts with the market regime, and sports/short-dated markets are excluded.
sigma = 6.7                  # median annualized log-odds vol ln(p/(1-p)); drives spread
base_spread = 0.005          # floor half-spread (USDC/share) added on top of gamma term
k_gamma = 0.0008             # gain: half-spread widens by k_gamma * gamma(p,T) * sigma
k_inv = 0.001                # gain: reservation price skews by k_inv * net_inventory
target_inventory = 0         # desired signed YES position (shares); quotes mean-revert to it
max_inventory = 100          # hard cap on |net YES shares|; never quote past it
quote_size = 10              # shares quoted per side
min_hours_to_resolution = 6  # stop quoting + flatten when closer than this to resolution
gamma_ceiling = 51.0         # stop quoting when gamma(p,T)*sigma exceeds this (~1 day out)
tick_size = 0.01             # price grid; quotes are quantized to this

# Volatility estimation: when true, the runner refines sigma per market online
# from its rolling mid history, falling back to the value above on thin history.
estimate_sigma = true
sigma_window = 50            # rolling samples used when estimate_sigma = true
sigma_floor = 0.1            # lower bound on the estimated sigma
